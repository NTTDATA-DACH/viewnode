schema_version: "1.0"

extension:
  id: "status"
  name: "Project Status"
  version: "1.0.0"
  description: "Show current SDD workflow progress — active feature, artifact status, task completion, workflow phase, and extensions summary."
  author: "KhawarHabibKhan"
  repository: "https://github.com/KhawarHabibKhan/spec-kit-status"
  license: "MIT"
  homepage: "https://github.com/KhawarHabibKhan/spec-kit-status"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.status.show"
      file: "commands/show.md"
      description: "Show project status and SDD workflow progress"
      aliases: ["speckit.status"]

tags:
  - "status"
  - "workflow"
  - "progress"
  - "feature-tracking"
  - "task-progress"
